experiment_id: exp-main
route_id: route-method
claim_ids:
  - C1
hypothesis: The method improves the declared primary metric under the frozen claim.
primary_metric: F1
metric_direction: higher_is_better
datasets:
  - dataset-name
baselines:
  - baseline-name
simple_controls:
  - simplest-control-that-could-kill-the-route
source_paths:
  - results/main.csv
expected_outputs:
  - result_ledger.jsonl
budget: one low-cost pilot plus one frozen rerun if the pilot supports the claim
success_criterion: The method beats the simple control and relevant baseline on the primary metric.
partial_support_policy: Mark partial if the result supports only a weaker claim or a narrower setting.
kill_criterion: Kill or redesign the route if the method is below the simple control on the primary metric.
failure_action: failure_diagnosis_then_repair_test
paper_decision_affected: Claim C1 remains, is weakened, or is deleted.
