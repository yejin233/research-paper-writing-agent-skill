workflow_id: paper-workflow
protected_paths:
  - paper/main.tex
  - paper/*.tex
  - paper_claims.md
  - claim_evidence_map.md
roles:
  - role: Literature Agent
    allowed_outputs:
      - literature_matrix.md
      - paper/handoffs/literature-agent/*.md
    direct_manuscript_edit: no
  - role: Experiment Agent
    allowed_outputs:
      - experiment_license.yaml
      - experiment_log.md
      - results/**
      - paper/handoffs/experiment-agent/*.md
    direct_manuscript_edit: no
  - role: Result Auditor
    allowed_outputs:
      - result_ledger.jsonl
      - result_audit.md
      - paper/handoffs/result-auditor/*.md
    direct_manuscript_edit: no
  - role: Writing Agent
    allowed_outputs:
      - paper/patches/*.diff
      - paper/handoffs/writing-agent/*.md
    direct_manuscript_edit: no
  - role: Research Coordinator
    allowed_outputs:
      - coordinator_integration.md
      - paper/main.tex
      - paper/*.tex
      - revision_trace.md
    direct_manuscript_edit: yes
coordinator_integration_required: yes
